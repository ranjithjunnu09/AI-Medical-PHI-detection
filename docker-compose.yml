version: "3.9"

services:

  backend:
    build: .
    container_name: ai-medical-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama: